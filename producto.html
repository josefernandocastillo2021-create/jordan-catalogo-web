<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Producto — Almacén El Jordán</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .detalle-contenedor {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    /* === Galería === */
    .galeria {
      position: sticky;
      top: calc(var(--navbar-height) + var(--categorias-height) + 16px);
      display: flex;
      gap: 12px;
    }

    .galeria__miniaturas {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 72px;
      flex-shrink: 0;
    }

    .miniatura {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      border: 2px solid var(--color-borde);
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      background: #f5f5f5;
      transition: border-color 0.2s;
    }

    .miniatura.activa { border-color: var(--color-primario); }
    .miniatura:hover { border-color: var(--color-primario); }

    .miniatura img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .galeria__principal {
      flex: 1;
      position: relative;
      background: #f5f5f5;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #foto-principal {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .galeria__nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      color: var(--color-texto);
      transition: background 0.2s;
    }

    .galeria__nav:hover { background: white; }
    .galeria__nav--prev { left: 8px; }
    .galeria__nav--next { right: 8px; }

    /* === Info del producto === */
    .producto-info { display: flex; flex-direction: column; gap: 16px; }

    .breadcrumb {
      font-size: 13px;
      color: var(--color-texto-secundario);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .breadcrumb a { color: var(--color-primario); }
    .breadcrumb a:hover { text-decoration: underline; }

    .producto-info__id {
      font-size: 12px;
      color: var(--color-texto-secundario);
      background: var(--color-fondo);
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .producto-info__nombre {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-texto);
      line-height: 1.3;
    }

    .producto-info__precios {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .producto-info__precio {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-primario);
    }

    .producto-info__precio-anterior {
      font-size: 18px;
      color: var(--color-precio-anterior);
      text-decoration: line-through;
    }

    .producto-info__badge-oferta {
      background: var(--color-secundario);
      color: white;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .producto-info__descripcion {
      font-size: 14px;
      color: var(--color-texto-secundario);
      line-height: 1.6;
      padding: 16px;
      background: var(--color-fondo);
      border-radius: 8px;
      border-left: 3px solid var(--color-primario);
    }

    .producto-info__btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      background: var(--color-success);
      color: white;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      transition: background 0.2s;
      border: none;
      width: 100%;
      cursor: pointer;
      font-family: inherit;
    }

    .producto-info__btn-wa:hover { background: var(--color-success-hover); }

    .producto-info__servicios {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      background: var(--color-fondo);
      border-radius: 8px;
      font-size: 13px;
      color: var(--color-texto-secundario);
    }

    .producto-info__servicios span { display: flex; align-items: center; gap: 8px; }

    /* === Responsive === */
    @media (max-width: 768px) {
      .detalle-contenedor {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .galeria {
        position: static;
        flex-direction: column-reverse;
      }

      .galeria__miniaturas {
        flex-direction: row;
        width: 100%;
        overflow-x: auto;
      }

      .miniatura { flex-shrink: 0; }

      .producto-info__precio { font-size: 26px; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <a href="index.html" class="navbar__logo" aria-label="Almacén El Jordán - Inicio">
      <img src="img/logo.svg" alt="Almacén El Jordán" class="navbar__logo-img">
    </a>

    <form class="navbar__busqueda" onsubmit="event.preventDefault(); window.location='index.html?q='+encodeURIComponent(this.q.value)">
      <input type="text" name="q" placeholder="Buscar productos..." autocomplete="off">
      <button type="submit" aria-label="Buscar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </form>

    <a href="index.html" class="navbar__menu-btn" style="display:flex; align-items:center;" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </a>
  </header>

  <!-- Barra categorías (solo estética, sin funcionalidad en detalle) -->
  <div class="categorias-bar" style="justify-content:flex-start;">
    <a href="index.html" style="font-size:13px; color:var(--color-texto-secundario); display:flex; align-items:center; gap:4px; padding: 0 8px;">
      ← Volver al catálogo
    </a>
  </div>

  <!-- ===== CONTENIDO ===== -->
  <div class="detalle-contenedor" id="detalle-contenedor">
    <!-- Cargando... -->
    <div style="grid-column:1/-1; display:flex; justify-content:center; padding:60px;">
      <div class="loading"><div class="spinner"></div><span>Cargando producto...</span></div>
    </div>
  </div>

  <!-- ===== BOTÓN FLOTANTE WHATSAPP ===== -->
  <a href="https://wa.me/50494452724" target="_blank" class="whatsapp-float" aria-label="WhatsApp">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <script src="js/whatsapp.js"></script>
  <script src="js/galeria.js"></script>
  <script>
    const CACHE_KEY = 'jordan_productos';

    function leerCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const { ts, datos } = JSON.parse(raw);
        if (Date.now() - ts > 30 * 60 * 1000) return null;
        return datos;
      } catch { return null; }
    }

    async function cargarProducto() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) { window.location = 'index.html'; return; }

      let productos = leerCache();

      if (!productos) {
        const res = await fetch('data/productos.json');
        productos = await res.json();
      }

      const producto = productos.find(p => p.id === id);
      if (!producto) { window.location = 'index.html'; return; }

      document.title = `${producto.nombre} — Almacén El Jordán`;
      renderizarDetalle(producto);
    }

    function renderizarDetalle(p) {
      const tieneOferta = p.precio_anterior && p.precio_anterior > p.precio;
      const descuento = tieneOferta ? Math.round((1 - p.precio / p.precio_anterior) * 100) : 0;
      const linkWA = generarLinkWhatsApp(p.nombre, p.precio);

      const badgeOferta = tieneOferta
        ? `<span class="producto-info__badge-oferta">-${descuento}% OFERTA</span>`
        : '';

      const precioAnterior = tieneOferta
        ? `<span class="producto-info__precio-anterior">L ${p.precio_anterior.toLocaleString('es-HN')}</span>`
        : '';

      document.getElementById('detalle-contenedor').innerHTML = `
        <!-- Galería -->
        <div class="galeria" id="galeria-contenedor">
          <div class="galeria__miniaturas" id="miniaturas"></div>
          <div class="galeria__principal">
            <img id="foto-principal" src="" alt="${p.nombre}" loading="eager">
            <button class="galeria__nav galeria__nav--prev" onclick="fotoAnterior()" aria-label="Anterior">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="galeria__nav galeria__nav--next" onclick="fotoSiguiente()" aria-label="Siguiente">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>

        <!-- Info -->
        <div class="producto-info">
          <nav class="breadcrumb" aria-label="Ruta">
            <a href="index.html">Inicio</a>
            <span>›</span>
            <a href="index.html?cat=${encodeURIComponent(p.categoria)}">${p.categoria}</a>
            <span>›</span>
            <span>${p.nombre}</span>
          </nav>

          <span class="producto-info__id">Código: ${p.id}</span>

          <h1 class="producto-info__nombre">${p.nombre}</h1>

          <div class="producto-info__precios">
            <span class="producto-info__precio">L ${p.precio.toLocaleString('es-HN')}</span>
            ${precioAnterior}
            ${badgeOferta}
          </div>

          ${p.descripcion ? `<p class="producto-info__descripcion">${p.descripcion}</p>` : ''}

          <a href="${linkWA}" target="_blank" class="producto-info__btn-wa">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Consultar por WhatsApp
          </a>

          <div class="producto-info__servicios">
            <span>📦 Envíos a nivel nacional</span>
            <span>💳 Crédito con cédula</span>
            <span>🗓️ Apartado hasta 2 meses sin intereses</span>
            <span>📱 Atención por WhatsApp: 9445-2724</span>
          </div>
        </div>
      `;

      iniciarGaleria(p);
    }

    cargarProducto();
  </script>
</body>
</html>
